apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-web-app
  labels:
    app: my-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: my-web-app
        image: ghcr.io/ayatorious/my-web-app:latest    # ⭐ 내가 만든 이미지!
        ports:
        - containerPort: 8080                            # 우리 앱은 8080
